name: Sync job tracker data

on:
  schedule:
    # Runs at 13:00, 17:00, and 21:00 UTC = roughly 6am, 10am, and 2pm Pacific.
    # Adjust as you like — cron is always UTC.
    - cron: '0 13,17,21 * * *'
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run sync script
        env:
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
        run: node scripts/sync-data.mjs

      - name: Commit updated data.json if changed
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- public/data.json; then
            echo "No changes to public/data.json — skipping commit."
          else
            git add public/data.json
            git commit -m "Auto-sync job tracker data"
            git push
          fi
