name: Sync job tracker data

on:
  schedule:
    - cron: '0 13,17,21 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run sync script
        env:
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
        run: node scripts/sync-data.mjs

      - name: Commit updated data.json if changed
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "No changes to public/data.json — skipping commit."
          else
            git commit -m "Auto-sync job tracker data"
            git push
          fi
